<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>klient.fun | App</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;800&display=swap">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="app_style.css">
</head>
<body onmousedown="if(event.target === document.body || event.target.id === 'login-screen') bridge?.DragWindow()">
    
    <!-- Window Controls -->
    <div class="window-controls">
        <button class="control-btn btn-min" onclick="minimizeWindow()">
            <i data-lucide="minus"></i>
        </button>
        <button class="control-btn btn-close" onclick="exitWindow()">
            <i data-lucide="x"></i>
        </button>
    </div>

    <div id="toast-container"></div>
    <div class="background-mesh"></div>

    <!-- Login Screen -->
    <main id="login-screen" class="screen active login-wrapper">
        <div class="login-card">
            <div class="brand">
                <h1>klient.fun</h1>
            </div>
            <div class="login-form">
                <input type="text" id="licenseKey" placeholder="Enter license" autocomplete="off" spellcheck="false" required>
                <button type="button" class="btn-primary" onclick="handleLogin()">
                    -> Login
                </button>
            </div>
        </div>
    </main>

    <!-- Loader Screen -->
    <div id="loader-screen" class="screen">
        <div class="loader-content">
            <div class="spinner"></div>
            <h2 class="loader-text" style="color: var(--text-secondary); font-size: 1rem;">Initializing Modules</h2>
        </div>
    </div>

    <!-- Main Menu -->
    <div id="main-menu" class="screen">
        <div class="app-container">
            <!-- Sidebar -->
            <aside class="sidebar" onmousedown="bridge?.DragWindow()">
                <div class="sidebar-brand">
                    <span>KLIENT</span>
                </div>
                <nav class="nav-list">
                    <div class="nav-item active" onclick="switchCategory('assistance')">
                        <i data-lucide="target"></i>
                        <span>Assistance</span>
                    </div>
                    <div class="nav-item" onclick="switchCategory('exploits')">
                        <i data-lucide="zap"></i>
                        <span>Exploits</span>
                    </div>
                    <div class="nav-item" onclick="switchCategory('movement')">
                        <i data-lucide="move"></i>
                        <span>Movement</span>
                    </div>
                    <div class="nav-item" onclick="switchCategory('config')">
                        <i data-lucide="settings-2"></i>
                        <span>Config</span>
                    </div>
                </nav>
            </aside>

            <!-- Main Content -->
            <main class="main-content">
                <div class="category-content" id="cat-assistance">
                    <h2 class="category-title">Assistance</h2>
                    
                    <div class="settings-grid">
                        <div class="settings-group">
                            <h3>Aimbot Configuration</h3>
                            <div class="setting-item">
                                <label>Prediction</label>
                                <div class="slider-container">
                                    <input type="range" id="prediction" min="0" max="0.5" step="0.001" value="0.0" oninput="updateVal('prediction', parseFloat(this.value).toFixed(3))">
                                    <span class="val-display" id="prediction-val">0.000</span>
                                </div>
                            </div>
                            <div class="setting-item">
                                <label>Hitchance</label>
                                <div class="slider-container">
                                    <input type="range" id="hitchance" min="0" max="100" value="100" oninput="updateVal('hitchance', this.value + '%')">
                                    <span class="val-display" id="hitchance-val">100%</span>
                                </div>
                            </div>
                        </div>

                        <div class="settings-group">
                            <h3>Target Selection</h3>
                            <div class="setting-item">
                                <label>Field of View</label>
                                <div class="slider-container">
                                    <input type="range" id="fov" min="0" max="360" value="180" oninput="updateVal('fov', this.value)">
                                    <span class="val-display" id="fov-val">180</span>
                                </div>
                            </div>
                            <div class="setting-item">
                                <label>Priority</label>
                                <select id="target-priority" onchange="updateVal('priority', this.value)">
                                    <option>Head</option>
                                    <option selected>Closest</option>
                                    <option>FOV Center</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Footer Action Bar -->
                <div class="bottom-bar">
                    <button class="btn-secondary" onclick="resetDefaults()">RESET</button>
                    <button class="btn-primary btn-update" onclick="applyUpdate()">
                        <i data-lucide="refresh-cw"></i>
                        <span>UPDATE</span>
                    </button>
                </div>
            </main>
        </div>
    </div>

    <script src="app_script.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
