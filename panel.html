<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klient</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="toast-container"></div>
    <div class="mesh-bg">
        <div class="mesh-blob blob-1"></div>
        <div class="mesh-blob blob-2"></div>
    </div>

    <div class="container panel-container" style="display: none;" id="contentBox">
        <div class="header">
            <div class="title-group">
                <img src="../Klient.png" width="32" style="border-radius:8px;" alt="Logo">
                <h1 class="brand">Klient</h1>
            </div>
            <button class="btn danger-btn sm-btn" onclick="logout()">X</button>
        </div>

        <div class="panel-grid">
            <div class="card status-card">
                <h3>License Details</h3>
                <div class="info-row">
                    <span>Status:</span>
                    <span id="u_status" class="highlight">Loading...</span>
                </div>
                <div class="info-row">
                    <span>Expiry Date:</span>
                    <span id="u_expiry">Loading...</span>
                </div>
            </div>

            <div class="card id-card">
                <h3>Connection Info</h3>
                <div class="info-row">
                    <span>HWID:</span>
                    <span id="u_hwid" class="code-text">Loading...</span>
                </div>
                <div class="info-row">
                    <span>Discord ID:</span>
                    <span id="u_discord" class="code-text">Loading...</span>
                </div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn primary-btn pulse" id="downloadBtn" onclick="downloadProduct()">
                Download Latest Version
            </button>
            <a href="https://discord.gg/F6GVM27vTm" target="_blank" class="btn discord-btn">
                Join Discord Server
            </a>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        window.addEventListener('load', () => {
            initUserPanel();
        });
    </script>
</body>

</html>
