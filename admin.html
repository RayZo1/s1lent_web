<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>klient.fun &middot; Admin</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="toast-container"></div>
    <div class="background-mesh"></div>

    <div id="give-license-modal" class="modal-overlay" aria-hidden="true" onclick="closeGiveLicenseModal()">
        <div class="modal-box" onclick="event.stopPropagation()">
            <h3 class="modal-title">Give license</h3>
            <p class="modal-desc">Create a new license and assign it to this user.</p>
            <div class="input-group">
                <input type="number" id="giveLicenseDays" class="input-field" placeholder="Expiry (days)" value="30"
                    min="1">
            </div>
            <div class="input-group">
                <input type="text" id="giveLicensePrefix" class="input-field" placeholder="Prefix (e.g. UG)" value="">
            </div>
            <div class="modal-actions" style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                <button type="button" class="btn-primary btn-danger" onclick="closeGiveLicenseModal()"
                    style="margin: 0;">Cancel</button>
                <button type="button" class="btn-primary" onclick="confirmGiveLicense()"
                    style="margin: 0;">Confirm</button>
            </div>
        </div>
    </div>

    <main class="admin-wrapper">
        <div class="content-card" style="display: none;" id="contentBox">
            <header class="header">
                <div class="brand-group">
                    <span class="brand-name" style="font-weight: 700;">Klient</span>
                    <span
                        style="color: var(--text-secondary); font-size: 0.85rem; margin-left: 0.5rem;">Administration</span>
                </div>
                <button class="btn-primary btn-sm btn-danger" onclick="logout()"
                    style="width: auto; margin: 0;">Logout</button>
            </header>

            <div class="admin-grid">
                <div class="card stats-card full-width">
                    <h3>System Stats</h3>
                    <div class="stats-row">
                        <div class="stat-box">
                            <span class="stat-value" id="a_users">0</span>
                            <span class="stat-label">Users</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-value" id="a_available">0</span>
                            <span class="stat-label">Unused</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-value" id="a_bans">0</span>
                            <span class="stat-label">Bans</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-value" id="a_version">1.0</span>
                            <span class="stat-label">Version</span>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <h3>Create Key</h3>
                    <div class="input-group">
                        <input type="number" id="genDays" class="input-field" placeholder="Duration (Days)" value="30">
                    </div>
                    <div class="input-group">
                        <input type="text" id="genPrefix" class="input-field" placeholder="Prefix (e.g. UG)" value="">
                    </div>
                    <button class="btn-primary" onclick="generateLicense()">Create</button>
                </div>

                <div class="card full-width">
                    <div class="list-tabs">
                        <button type="button" class="tab-btn active" data-tab="available"
                            onclick="switchAdminTab('available')">Keys</button>
                        <button type="button" class="tab-btn" data-tab="users"
                            onclick="switchAdminTab('users')">Userbase</button>
                        <button type="button" class="tab-btn" data-tab="updates"
                            onclick="switchAdminTab('updates')">Script Updates</button>
                    </div>

                    <div id="tab-available" class="tab-pane active">
                        <div class="user-list" id="adminAvailableList">
                            <p style="color: var(--text-secondary); font-size: 0.9rem;">Fetching active keys...</p>
                        </div>
                    </div>

                    <div id="tab-users" class="tab-pane" style="display: none;">
                        <div class="input-group" style="margin-bottom: 1.5rem;">
                            <input type="text" id="userSearch" class="input-field" style="text-align: left;"
                                placeholder="Search users, HWIDs, or keys..." onkeyup="filterUsers()">
                        </div>
                        <div class="user-list" id="adminUserList">
                            <p style="color: var(--text-secondary); font-size: 0.9rem;">Loading user records...</p>
                        </div>
                    </div>

                    <div id="tab-updates" class="tab-pane" style="display: none;">
                        <div
                            style="max-width: 500px; margin: 1rem auto; display: flex; flex-direction: column; gap: 1.5rem;">
                            <div class="card" style="border-top: 3px solid var(--royal-blue); padding: 2rem;">
                                <h3 style="margin-bottom: 0.5rem;">Script Version Control</h3>
                                <p style="color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 2rem;">Update
                                    the remote configuration for all active clients.</p>

                                <div class="input-group">
                                    <label class="user-sub" style="margin-bottom: 0.5rem; display: block;">New Version
                                        Label</label>
                                    <input type="text" id="updateVersion" class="input-field"
                                        placeholder="e.g. 1.2, 2.0-beta" style="text-align: left;">
                                </div>
                                <div class="input-group" style="margin-top: 1rem;">
                                    <label class="user-sub" style="margin-bottom: 0.5rem; display: block;">Download /
                                        CDN URL</label>
                                    <input type="text" id="updateUrl" class="input-field"
                                        placeholder="https://cdn.example.com/script.rar" style="text-align: left;">
                                </div>
                                <button class="btn-primary" onclick="updateProduct()"
                                    style="background: var(--royal-blue); color: white; margin-top: 1.5rem; height: 50px;">Deploy
                                    to Fleet</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        window.addEventListener('load', () => {
            initAdminPanel();
        });
    </script>
</body>

</html>
