<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Where shit goes down.</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="toast-container"></div>
    <div id="particles"></div>

    <div class="container admin-container" style="display: none;" id="contentBox">
        <div class="header">
            <h1 class="brand">Klient</h1>
            <button class="btn danger-btn sm-btn" onclick="logout()">Logout</button>
        </div>

        <div class="admin-grid">

            <div class="card stats-card">
                <h3>Stats</h3>
                <div class="stats-row">
                    <div class="stat-box">
                        <span class="stat-value" id="a_users">0</span>
                        <span class="stat-label">Total Users</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-value" id="a_available">0</span>
                        <span class="stat-label">Available Licenses</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-value" id="a_bans">0</span>
                        <span class="stat-label">Active Bans</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-value" id="a_version">1.0</span>
                        <span class="stat-label">Latest Version</span>
                    </div>
                </div>
            </div>

            <div class="card action-card">
                <h3>Create</h3>
                <div class="input-group">
                    <input type="number" id="genDays" placeholder="License Duration (Days)" value="30">
                </div>
                <div class="input-group">
                    <input type="text" id="genPrefix" placeholder="Custom Prefix (Optional)" value="UG">
                </div>
                <div class="input-group" style="display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem;">
                    <input type="checkbox" id="genIsAdmin" style="width: auto; margin: 0;">
                    <label for="genIsAdmin" style="color: var(--text-muted); cursor: pointer; user-select: none;">Set as
                        Main Admin Key</label>
                </div>
                <button class="btn primary-btn full-width" onclick="generateLicense()">Generate Key</button>
            </div>

            <div class="card action-card">
                <h3>Update</h3>
                <div class="input-group">
                    <input type="text" id="updateVersion" placeholder="New Version (e.g. 1.2)">
                </div>
                <div class="input-group">
                    <input type="text" id="updateUrl" placeholder="New Download URL">
                </div>
                <button class="btn primary-btn full-width" onclick="updateProduct()">Publish Update</button>
            </div>

        </div>

        <div class="card full-width list-card">
            <div class="list-tabs">
                <button type="button" class="tab-btn active" data-tab="available" onclick="switchAdminTab('available')">Available Licenses</button>
                <button type="button" class="tab-btn" data-tab="users" onclick="switchAdminTab('users')">Users</button>
            </div>
            <div id="tab-available" class="tab-pane active">
                <div class="user-list" id="adminAvailableList">
                    <p>Loading...</p>
                </div>
            </div>
            <div id="tab-users" class="tab-pane" style="display: none;">
                <div class="input-group" style="margin-bottom: 20px;">
                    <input type="text" id="userSearch" placeholder="Search by Discord ID, Username, HWID, or License..."
                        onkeyup="filterUsers()">
                </div>
                <div class="user-list" id="adminUserList">
                    <p>Loading users...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        window.addEventListener('load', () => {
            initAdminPanel();
        });
    </script>
</body>

</html>
