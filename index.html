<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ace.fun | Login</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="toast-container"></div>

    <div class="background-mesh"></div>

    <main class="login-wrapper">
        <div class="login-card">
            <div class="brand-header">
            </div>

            <p class="subtitle">Ace.fun</p>

            <form class="login-form" id="loginForm">
                <div class="input-group">
                    <input type="text" id="licenseKey" placeholder="Enter license" autocomplete="off" spellcheck="false"
                        required style="text-align: left;">
                </div>

                <button type="button" class="btn-primary" onclick="login()">
                    -> Login
                </button>
            </form>

            <div class="support-links">
                <a href="https://discord.gg/F6GVM27vTm" target="_blank" class="text-link">Need a license? Join our
                    Discord</a>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
