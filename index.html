<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underground - Login</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="particles"></div>

    <div class="container login-container">
        <h1>UNDER<span class="app-name">GROUND</span></h1>
        <p>Enter your license key to access the panel.</p>

        <div class="input-group">
            <input type="text" id="licenseKey" placeholder="License Key" autocomplete="off">
        </div>

        <button class="btn primary-btn" onclick="login()">
            Authenticate
        </button>

        <a href="https://discord.gg/F6GVM27vTm" class="discord-link" target="_blank">
            Need a key? Join our Discord.
        </a>
    </div>

    <script src="script.js"></script>
</body>

</html>
