<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klient | Premium Utility</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;800&display=swap">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="toast-container"></div>

    <!-- Login Screen -->
    <main id="login-screen" class="screen active">
        <div class="login-card">
            <div class="brand-header">
                <span class="brand-logo">M</span>
                <span class="brand-name">Klient</span>
            </div>
            <p class="subtitle">Secure Authentication</p>
            <form id="loginForm" class="login-form">
                <div class="input-group">
                    <input type="text" id="licenseKey" placeholder="LICENSE KEY" autocomplete="off" spellcheck="false" required>
                </div>
                <button type="button" class="btn-primary" onclick="handleLogin()">SIGN IN</button>
            </form>
            <div class="support-links">
                <a href="https://discord.gg/klient" target="_blank" class="text-link">Get a license</a>
            </div>
        </div>
    </main>
    <!-- Loader Screen -->
    <main id="loader-screen" class="screen">
        <div class="loader-content">
            <div class="loader-spinner"></div>
            <p class="loader-text">Initializing Modules</p>
        </div>
    </main>

    <!-- Main Menu -->
    <main id="main-menu" class="screen">
        <div class="menu-container">
            <!-- Sidebar -->
            <aside class="sidebar" onmousedown="if(event.target === this || event.target.classList.contains('sidebar-header')) window.chrome.webview.hostObjects.bridge.DragWindow()">
                <div class="sidebar-header">
                    <span class="logo-m">M</span>
                    <span class="logo-text">MOOZE</span>
                </div>
                <nav class="sidebar-nav">
                    <div class="nav-item active" onclick="switchCategory('assistance')">
                        <i data-lucide="crosshair"></i>
                        <span>Assistance</span>
                    </div>
                    <div class="nav-item" onclick="switchCategory('exploits')">
                        <i data-lucide="zap"></i>
                        <span>Exploits</span>
                    </div>
                    <div class="nav-item" onclick="switchCategory('movement')">
                        <i data-lucide="move"></i>
                        <span>Movement</span>
                    </div>
                    <div class="nav-item" onclick="switchCategory('config')">
                        <i data-lucide="settings"></i>
                        <span>Config</span>
                    </div>
                    <div class="nav-item" onclick="switchCategory('settings')">
                        <i data-lucide="user"></i>
                        <span>Settings</span>
                    </div>
                </nav>
            </aside>

            <!-- Main Content Area -->
            <section class="main-content">
                <!-- Top Tabs -->
                <header class="content-tabs">
                    <div class="tab active" data-category="assistance">General</div>
                    <div class="tab" data-category="assistance">Silent Aim</div>
                    <div class="tab" data-category="assistance">Aimbot</div>
                    <div class="tab" data-category="assistance">Trigger Bot</div>
                </header>

                <!-- Scrollable Settings -->
                <div class="settings-grid">
                        <div class="setting-row">
                            <span class="setting-label">Enabled</span>
                            <label class="custom-checkbox">
                                <input type="checkbox" checked onchange="updateVal('enabled', this.checked)">
                                <span class="checkmark"></span>
                            </label>
                        </div>
                        <div class="setting-row">
                            <span class="setting-label">Silent Aim</span>
                            <label class="custom-checkbox">
                                <input type="checkbox" onchange="updateVal('silent', this.checked)">
                                <span class="checkmark"></span>
                            </label>
                        </div>
                        <div class="setting-row">
                            <span class="setting-label">Prediction</span>
                            <span class="setting-value" id="prediction-val">0.000</span>
                        </div>
                        <div class="slider-container">
                            <input type="range" class="slider" min="0" max="1" step="0.001" value="0.0" oninput="updateVal('prediction', this.value)">
                        </div>

                        <div class="setting-row">
                            <span class="setting-label">Hit Position</span>
                            <select class="dropdown" onchange="updateVal('hit-position', this.value)">
                                <option>Closest Point</option>
                                <option>Head</option>
                                <option>Torso</option>
                            </select>
                        </div>

                        <div class="setting-row">
                             <span class="setting-label">Hit Chance</span>
                             <span class="setting-value" id="hitchance-val">100%</span>
                        </div>
                        <div class="slider-container">
                            <input type="range" class="slider" min="0" max="100" step="1" value="100" oninput="updateVal('hitchance', this.value + '%')">
                        </div>

                        <div class="setting-row">
                             <span class="setting-label">FOV</span>
                             <span class="setting-value" id="fov-val">180</span>
                        </div>
                        <div class="slider-container">
                            <input type="range" class="slider" min="0" max="1000" step="1" value="180" oninput="updateVal('fov', this.value)">
                        </div>

                        <div class="setting-row">
                             <span class="setting-label">Smooth</span>
                             <span class="setting-value" id="smooth-val">1.0</span>
                        </div>
                        <div class="slider-container">
                            <input type="range" class="slider" min="1" max="10" step="0.1" value="1.0" oninput="updateVal('smooth', this.value)">
                        </div>
                    </div>
                    <!-- More groups here -->
                </div>

                <!-- Footer Actions -->
                <footer class="content-footer">
                    <div class="config-actions">
                        <button class="btn-secondary" onclick="saveConfig()">SAVE CONFIG</button>
                        <button class="btn-secondary" onclick="loadConfig()">LOAD CONFIG</button>
                    </div>
                    <div class="app-status">
                         <span class="status-indicator online"></span>
                         <span>CONNECTED</span>
                    </div>
                </footer>
            </section>
        </div>
        <!-- Manual Update Button -->
        <button class="btn-update" onclick="applyUpdate()">
            <i data-lucide="refresh-cw"></i>
            <span>UPDATE</span>
        </button>
    </main>

    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
